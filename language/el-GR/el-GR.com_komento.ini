COM_KT_GDPR_REQUEST_IS_READY_DESC="Το αίτημά σας για λήψη δεδομένων του λογαριασμού σας έχει πλέον ολοκληρωθεί και το αρχείο θα λήξει αυτόματα σε <b>%1$s ημέρες </b>. Λάβετε υπόψη ότι το αρχείο ενδέχεται να περιέχει ευαίσθητες πληροφορίες σχετικά με τον λογαριασμό σας. Θα πρέπει να επανεξετάστε πριν μοιραστείτε αυτό το αρχείο με κάποιον άλλο. "
