COM_KT_GDPR_DATA_DESC="Αυτή η λήψη αποτελείται από αρχεία και δεδομένα που έχουν αποθηκευτεί όταν χρησιμοποιείτε τον ιστότοπό μας. Μπορείτε να προβάλετε και να ελέγξετε αυτά τα δεδομένα. <br /> <br /> Σε περίπτωση που θέλετε να καταργήσετε τα δεδομένα, μπορείτε πρόσβαση στον ιστότοπο για ενημέρωση ή κατάργηση των απαραίτητων στοιχείων. "
COM_KT_GDPR_DOWNLOAD_DESC1="Αυτή η διαδικασία μπορεί να διαρκέσει λίγο, ανάλογα με το φορτίο του διακομιστή, καθώς θα χρειαζόταν να συγκεντρώσει όλες τις λεπτομέρειες και άλλες σχετικές πληροφορίες από τον λογαριασμό σας."
COM_KT_GDPR_DOWNLOAD_DESC2="Θα σας στείλουμε ένα μήνυμα ηλεκτρονικού ταχυδρομείου ειδοποίησης μόλις ολοκληρωθεί η λήψη. Ο σύνδεσμος λήψης θα σταλεί στη διεύθυνση ηλεκτρονικού ταχυδρομείου σας: <b>%1$s </b>"
COM_KT_GDPR_DOWNLOAD_DISABLED="Η λήψη απενεργοποιήθηκε από τον διαχειριστή του ιστότοπου."
COM_KT_GDPR_DOWNLOAD_ERROR_MULTIPLE_REQUEST="Δεν μπορείτε να ζητήσετε περισσότερες από μία φορές"
COM_KT_GDPR_DOWNLOAD_INFORMATION="Αίτηση πληροφοριών λογαριασμού"
COM_KT_GDPR_DOWNLOAD_INFORMATION_DESC="Μπορείτε να ζητήσετε να πραγματοποιήσετε λήψη ενός αντιγράφου των δεδομένων σας που είναι αποθηκευμένα στον ιστότοπο ανά πάσα στιγμή κάνοντας κλικ στο κουμπί λήψης παρακάτω. Η διαδικασία θα διαρκέσει λίγο, καθώς το σύστημα θα χρειαστεί να συλλέξει αυτές τις πληροφορίες από τον ιστότοπο και αρχειοθετήστε το σε αρχείο "
COM_KT_GDPR_DOWNLOAD_INFORMATION_PROCESSING="Αυτήν τη στιγμή συλλέγουμε δεδομένα από τον λογαριασμό σας και όλες τις άλλες σχετικές δραστηριότητες. Μόλις η λήψη είναι έτοιμη, θα δείτε ένα κουμπί λήψης παρακάτω για να πραγματοποιήσετε λήψη του αρχείου."
